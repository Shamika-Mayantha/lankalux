<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>New Request | LankaLux Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:#0f0f0f;color:#f5f5f5;line-height:1.7}

header{
  position:fixed;top:0;width:100%;
  background:rgba(15,15,15,.85);
  backdrop-filter:blur(6px);
  display:flex;justify-content:space-between;align-items:center;
  padding:22px 70px;z-index:1000;
  border-bottom:1px solid rgba(202,162,77,.2);
}

.logo{
  display:flex;
  align-items:center;
  gap:12px;
  text-decoration:none;
}

.logo-text{
  font-family:'Playfair Display',serif;
  font-size:26px;
  letter-spacing:1px;
  color:#f5f5f5;
}

.header-actions{
  display:flex;
  align-items:center;
  gap:20px;
}

.btn{
  display:inline-block;
  padding:12px 28px;
  background:#caa24d;
  color:#0f0f0f;
  text-decoration:none;
  font-weight:500;
  letter-spacing:1px;
  border:none;
  cursor:pointer;
  font-family:inherit;
  font-size:14px;
  border-radius:6px;
  transition:all .3s ease;
}

.btn:hover{
  background:#d4b35f;
  transform:translateY(-2px);
}

.btn-secondary{
  background:transparent;
  color:#caa24d;
  border:2px solid #caa24d;
}

.btn-secondary:hover{
  background:rgba(202,162,77,.1);
  color:#d4b35f;
  border-color:#d4b35f;
}

.container{
  max-width:900px;
  margin:0 auto;
  padding:120px 70px 60px;
}

.page-header{
  margin-bottom:40px;
}

.page-header h1{
  font-family:'Playfair Display',serif;
  font-size:38px;
  color:#f5f5f5;
  margin-bottom:10px;
}

.page-header p{
  color:#d0d0d0;
  font-size:15px;
}

.form-container{
  background:linear-gradient(145deg, #1a1a1a, #141414);
  padding:50px;
  border-left:4px solid #caa24d;
  border-radius:6px;
  box-shadow:
    0 4px 6px rgba(0,0,0,.3),
    0 2px 4px rgba(0,0,0,.2),
    inset 0 1px 0 rgba(255,255,255,.05);
}

.form-group{
  margin-bottom:28px;
}

.form-group label{
  display:block;
  margin-bottom:10px;
  color:#f5f5f5;
  font-size:14px;
  font-weight:400;
}

.form-group input,
.form-group textarea{
  width:100%;
  padding:14px 18px;
  background:#161616;
  border:1px solid #2a2a2a;
  border-radius:6px;
  color:#f5f5f5;
  font-family:inherit;
  font-size:15px;
  transition:all .3s;
}

.form-group input:focus,
.form-group textarea:focus{
  outline:none;
  border-color:#caa24d;
  background:#1a1a1a;
}

.form-group textarea{
  min-height:120px;
  resize:vertical;
}

.form-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.form-actions{
  display:flex;
  gap:15px;
  margin-top:40px;
}

.error-message{
  background:rgba(220,53,69,.1);
  border:1px solid rgba(220,53,69,.3);
  color:#e85d75;
  padding:12px 18px;
  border-radius:6px;
  margin-bottom:20px;
  font-size:14px;
  display:none;
}

.error-message.show{
  display:block;
}

.success-message{
  background:rgba(40,167,69,.1);
  border:1px solid rgba(40,167,69,.3);
  color:#28a745;
  padding:12px 18px;
  border-radius:6px;
  margin-bottom:20px;
  font-size:14px;
  display:none;
}

.success-message.show{
  display:block;
}

.loading{
  opacity:0.6;
  pointer-events:none;
}

@media (max-width:768px){
  .form-row{
    grid-template-columns:1fr;
  }
  
  .container{
    padding:120px 30px 60px;
  }
  
  .form-container{
    padding:30px;
  }
}
</style>
</head>
<body>
<header>
  <div class="logo">
    <span class="logo-text">LankaLux Admin</span>
  </div>
  <div class="header-actions">
    <a href="dashboard.html" class="btn btn-secondary">Back to Dashboard</a>
  </div>
</header>

<div class="container">
  <div class="page-header">
    <h1>New Request</h1>
    <p>Create a new lead request</p>
  </div>
  
  <div class="form-container">
    <div id="errorMessage" class="error-message"></div>
    <div id="successMessage" class="success-message"></div>
    
    <form id="newRequestForm">
      <div class="form-group">
        <label for="name">Name *</label>
        <input type="text" id="name" name="name" required>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label for="email">Email *</label>
          <input type="email" id="email" name="email" required>
        </div>
        
        <div class="form-group">
          <label for="whatsapp">WhatsApp</label>
          <input type="text" id="whatsapp" name="whatsapp">
        </div>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label for="travel_dates">Travel Dates</label>
          <input type="text" id="travel_dates" name="travel_dates" placeholder="e.g., March 15-25, 2024">
        </div>
        
        <div class="form-group">
          <label for="duration">Duration (days)</label>
          <input type="number" id="duration" name="duration" min="1">
        </div>
      </div>
      
      <div class="form-group">
        <label for="flying_from">Flying From</label>
        <input type="text" id="flying_from" name="flying_from">
      </div>
      
      <div class="form-group">
        <label for="details">Details</label>
        <textarea id="details" name="details" placeholder="Additional information about the request..."></textarea>
      </div>
      
      <div class="form-actions">
        <button type="submit" class="btn">Create Request</button>
        <a href="dashboard.html" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>

<script>
// Initialize Supabase
const SUPABASE_URL = 'https://evmsntnprujqfejkmipq.supabase.co';
const SUPABASE_KEY = 'sb_publishable_UwIwSJNQdfb4y6ow8Ft_Gg_KPvkMkJV';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Check authentication and redirect if not logged in
async function checkAuth() {
  try {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) {
      window.location.href = 'index.html';
      return false;
    }
    return true;
  } catch (error) {
    console.error('Auth check error:', error);
    window.location.href = 'index.html';
    return false;
  }
}

// Show error message
function showError(message) {
  const errorEl = document.getElementById('errorMessage');
  errorEl.textContent = message;
  errorEl.classList.add('show');
  setTimeout(() => {
    errorEl.classList.remove('show');
  }, 5000);
}

// Show success message
function showSuccess(message) {
  const successEl = document.getElementById('successMessage');
  successEl.textContent = message;
  successEl.classList.add('show');
  setTimeout(() => {
    successEl.classList.remove('show');
  }, 3000);
}

// Handle form submission
document.getElementById('newRequestForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const form = e.target;
  const submitBtn = form.querySelector('button[type="submit"]');
  
  // Get form values
  const formData = {
    name: document.getElementById('name').value.trim(),
    email: document.getElementById('email').value.trim(),
    whatsapp: document.getElementById('whatsapp').value.trim() || null,
    travel_dates: document.getElementById('travel_dates').value.trim() || null,
    duration: document.getElementById('duration').value ? parseInt(document.getElementById('duration').value) : null,
    flying_from: document.getElementById('flying_from').value.trim() || null,
    details: document.getElementById('details').value.trim() || null,
    status: 'new'
  };
  
  // Validate required fields
  if (!formData.name || !formData.email) {
    showError('Name and Email are required fields.');
    return;
  }
  
  // Show loading state
  submitBtn.textContent = 'Creating...';
  submitBtn.classList.add('loading');
  form.classList.add('loading');
  
  try {
    const { data, error } = await supabase
      .from('leads')
      .insert([formData])
      .select()
      .single();
    
    if (error) {
      console.error('Error creating lead:', error);
      showError(error.message || 'Failed to create request. Please try again.');
      submitBtn.textContent = 'Create Request';
      submitBtn.classList.remove('loading');
      form.classList.remove('loading');
      return;
    }
    
    if (data && data.id) {
      // Success - redirect to request page
      showSuccess('Request created successfully! Redirecting...');
      setTimeout(() => {
        window.location.href = `request.html?id=${data.id}`;
      }, 1000);
    }
  } catch (error) {
    console.error('Error:', error);
    showError('An unexpected error occurred. Please try again.');
    submitBtn.textContent = 'Create Request';
    submitBtn.classList.remove('loading');
    form.classList.remove('loading');
  }
});

// Initialize page
checkAuth();
</script>
</body>
</html>
